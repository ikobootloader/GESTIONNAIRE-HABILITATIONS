<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inspecteur .habil</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body { font-family: monospace; background:#0d1117; color:#e6edf3; padding:24px; font-size:13px; }
  h2 { color:#58a6ff; margin-bottom:16px; }
  .box { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px; margin:12px 0; }
  .ok { color:#3fb950; } .warn { color:#d29922; } .err { color:#f85149; }
  button { background:#238636; color:#fff; border:none; padding:8px 18px; border-radius:6px; cursor:pointer; margin-right:8px; }
  input[type=password] { background:#161b22; border:1px solid #30363d; color:#e6edf3; padding:8px 12px; border-radius:6px; font-family:monospace; }
  pre { white-space:pre-wrap; word-break:break-all; font-size:11px; color:#8b949e; }
  table { border-collapse:collapse; width:100%; font-size:11px; }
  th { background:#21262d; padding:6px 10px; text-align:left; color:#58a6ff; border:1px solid #30363d; }
  td { padding:5px 10px; border:1px solid #21262d; }
  td.val { color:#3fb950; } td.empty { color:#30363d; }
  #drop { border:2px dashed #30363d; border-radius:8px; padding:24px; text-align:center; cursor:pointer; margin-bottom:16px; }
  #drop.over { border-color:#58a6ff; }
</style>
</head>
<body>
<h2>🔬 Inspecteur de fichier .habil / .xlsx</h2>
<div id="drop" onclick="document.getElementById('fi').click()">
  Glissez votre fichier ici ou cliquez<br>
  <input type="file" id="fi" style="display:none" accept=".habil,.xlsx">
</div>
<input type="password" id="pwd" placeholder="Mot de passe (si .habil)…" style="margin-bottom:12px;width:300px;">
<button onclick="inspect()">Inspecter →</button>
<div id="out"></div>

<script>
const drop = document.getElementById('drop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over')});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');document.getElementById('fi').files=e.dataTransfer.files;drop.textContent=e.dataTransfer.files[0].name;});
document.getElementById('fi').addEventListener('change',e=>{if(e.target.files[0])drop.textContent=e.target.files[0].name;});

async function deriveKey(password, salt) {
  const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'}, keyMat, {name:'AES-GCM',length:256}, false, ['decrypt']);
}

async function inspect() {
  const fi = document.getElementById('fi');
  if (!fi.files[0]) { alert('Choisissez un fichier'); return; }
  const file = fi.files[0];
  const pwd  = document.getElementById('pwd').value.trim();
  const out  = document.getElementById('out');
  out.innerHTML = '<div class="box">⏳ Chargement…</div>';

  try {
    const ab = await file.arrayBuffer();
    let bytes = new Uint8Array(ab);

    if (file.name.endsWith('.habil')) {
      if (!pwd) { out.innerHTML='<div class="box err">❌ Mot de passe requis</div>'; return; }
      const salt = bytes.slice(4,20), iv = bytes.slice(20,32), ct = bytes.slice(32);
      const key  = await deriveKey(pwd, salt);
      const pt   = await crypto.subtle.decrypt({name:'AES-GCM',iv}, key, ct);
      bytes = new Uint8Array(pt);
    }

    const wb = XLSX.read(bytes, {type:'array', cellDates:true});
    let html = `<div class="box"><span class="ok">✅ Fichier lu — feuilles : ${wb.SheetNames.join(', ')}</span></div>`;

    // Inspecter chaque feuille
    for (const name of wb.SheetNames) {
      const ws = wb.Sheets[name];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      html += `<div class="box"><strong style="color:#58a6ff">📋 Feuille : ${name}</strong> (${rows.length} lignes)<br><br>`;
      html += '<table><thead><tr><th>#</th>';
      const maxCol = Math.max(...rows.map(r=>r.length), 0);
      for (let c=0;c<Math.min(maxCol,10);c++) html+=`<th>col${c}</th>`;
      html += '</tr></thead><tbody>';
      rows.slice(0, 30).forEach((r,i) => {
        html += `<tr><td style="color:#6e7681">${i}</td>`;
        for (let c=0;c<Math.min(maxCol,10);c++) {
          const v = r[c];
          const s = v!=null && v!=='' ? String(v) : '';
          html += s ? `<td class="val">${s.replace(/</g,'&lt;').slice(0,60)}</td>` : '<td class="empty">·</td>';
        }
        html += '</tr>';
      });
      if (rows.length > 30) html += `<tr><td colspan="${Math.min(maxCol,10)+1}" style="color:#6e7681;text-align:center">… ${rows.length-30} lignes supplémentaires</td></tr>`;
      html += '</tbody></table></div>';
    }

    // Simuler parseWorkbook
    html += '<div class="box"><strong style="color:#d29922">⚙️ Simulation parseWorkbook</strong><br><br>';
    if (wb.SheetNames.includes('Parametres')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['Parametres'], {header:1, defval:''});
      const cell = (r,v) => (r&&r[v]!=null)?r[v].toString().trim():'';
      const s=[],po=[],ro=[],pe=[];
      let dataStart=1, colServices=0, colPostes=2, colRoles=4, colPermissions=6;
      for (let i=0;i<Math.min(rows.length,5);i++) {
        const h0=cell(rows[i],0).toUpperCase(), h2=cell(rows[i],2).toUpperCase();
        if (!h0.includes('SERVICE')) continue;
        if (h2.includes('ROLE')||h2.includes('RÔLE')) { colPostes=-1; colRoles=2; colPermissions=4; }
        dataStart=i+1; break;
      }
      html += `Format détecté : dataStart=${dataStart} colPostes=${colPostes} colRoles=${colRoles} colPermissions=${colPermissions}<br><br>`;
      for (let i=dataStart;i<rows.length;i++) {
        const r=rows[i]; const label=cell(r,colServices);
        if (!label&&!cell(r,colRoles)&&!cell(r,colPermissions)) continue;
        if (label.includes('Periodicite')||label.includes('Alerte')) continue;
        const isAllCaps=str=>str&&str===str.toUpperCase()&&str.length>3;
        if (isAllCaps(label)&&!cell(r,colRoles)&&!cell(r,colPermissions)) continue;
        if (label) s.push(label);
        if (colPostes>=0&&cell(r,colPostes)) po.push(cell(r,colPostes));
        if (cell(r,colRoles)) ro.push(cell(r,colRoles));
        if (cell(r,colPermissions)) pe.push(cell(r,colPermissions));
      }
      html += `<span class="ok">services (${s.length})</span> : ${s.join(' | ')}<br>`;
      html += `<span class="ok">postes (${po.length})</span> : ${po.join(' | ')}<br>`;
      html += `<span class="ok">roles (${ro.length})</span> : ${ro.join(' | ')}<br>`;
      html += `<span class="ok">permissions (${pe.length})</span> : ${pe.join(' | ')}<br>`;
    } else {
      html += '<span class="warn">Pas de feuille Parametres</span>';
    }
    html += '</div>';
    out.innerHTML = html;
  } catch(e) {
    out.innerHTML = `<div class="box err">❌ Erreur : ${e.message}</div>`;
  }
}
</script>
</body>
</html>
